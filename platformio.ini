[platformio]
default_envs = cyd

[env:cyd]
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps =
  bodmer/TFT_eSPI
  tedtoal/XPT2046_Touchscreen_TT
  adafruit/Adafruit GFX Library
build_flags =
  -D APP_VERSION='"SignalLab 0.2.1-touchrec"'
  -D USER_SETUP_LOADED=1
  -D ILI9341_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TOUCH_CS=33
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_FONT6=1
  -D SPI_FREQUENCY=40000000
  -D SPI_READ_FREQUENCY=16000000
